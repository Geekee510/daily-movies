name: 每周新片更新

on:
  schedule:
    # 每周一北京时间 09:30 运行（UTC+8，即 UTC 01:30）
    # 周一 = Monday = MO
    - cron: '30 1 * * 1'
  # 允许手动触发（方便测试）
  workflow_dispatch:

permissions:
  contents: write   # 允许 Actions 把更新后的文件推回仓库

jobs:
  update-movies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests beautifulsoup4

      - name: 运行爬虫
        run: python scripts/fetch_movies.py

      - name: 提交并推送更新
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html movies.json
          # 只在有变化时才提交
          git diff --cached --quiet || git commit -m "chore: 每周新片更新 $(date +'%Y-%m-%d')"
          git push
